<!DOCTYPE html>
<html lang="en" class="articulate-embed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounting Pre-Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=2">
<style>
  /* ===== EMBED SHELL ===== */
  html.articulate-embed,
  html.articulate-embed body {
    height: 100%;
    margin: 0;
  }
  html.articulate-embed body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: Inter, system-ui, sans-serif;
  }
  .content.content-standalone {
    max-width: none;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ===== DUAL IDENTITY BAR ===== */
  /* Mirrors the identity-bar from the Simple Case activity, adapted to show
     both balance-sheet identities simultaneously. */
  .dual-identity-bar {
    background: var(--primary);
    color: white;
    border-radius: 0 0 6px 6px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: Inter, system-ui, sans-serif;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dib-side {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dib-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    opacity: 0.65;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 3px;
    padding: 2px 6px;
    white-space: nowrap;
  }
  .dib-eq {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .dib-group {
    text-align: center;
  }
  .dib-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.7;
    font-weight: 600;
    display: block;
    margin-bottom: 1px;
  }
  .dib-val {
    font-weight: 700;
    font-size: 14px;
    display: block;
  }
  .dib-op {
    font-size: 14px;
    opacity: 0.55;
    align-self: flex-end;
    padding-bottom: 2px;
  }
  .dib-divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* ===== PAGE INTRO TEXT ===== */
  .page-intro {
    font-family: 'Open Sans', sans-serif;
    font-size: 1rem;
    line-height: 1.7;
    color: #373a44;
    padding: 20px 20px 0;
  }

  /* ===== OUTER WRAP ===== */
  .articulate-wrap {
    padding: 12px 16px 32px;
  }

  /* ===== STAGE PROGRESS ===== */
  .stage-progress {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
    font-family: Inter, system-ui, sans-serif;
  }
  .stage-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
    transition: background 0.2s, width 0.2s, height 0.2s;
  }
  .stage-dot.done   { background: var(--primary-light); }
  .stage-dot.active { background: var(--accent); width: 10px; height: 10px; }
  .stage-label-pill {
    margin-left: 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
  }
  .stage-card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  /* ===== THREE-COLUMN GRID ===== */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1.8fr 1fr;
    gap: 14px;
    margin-bottom: 0;
    align-items: start;
  }

  /* ===== COLUMN HEADERS ===== */
  .bs-col-header {
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--primary);
    text-align: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
  }
  .bs-col-header.closing {
    color: var(--accent);
    border-color: var(--accent);
  }
  .bs-col-header.center-hdr {
    color: #555;
    border-color: #aaa;
  }

  /* ===== BALANCE SHEET ===== */
  .acct-col {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .acct-col h4 {
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--primary);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
  }
  .acct-line {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 4px 2px;
    color: #555;
    border-radius: 3px;
    transition: background 0.25s;
  }
  .acct-line .acct-val {
    font-weight: 600;
    color: #333;
  }
  .acct-total {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    padding-top: 8px;
    margin-top: 6px;
    border-top: 1px solid #ddd;
  }

  /* Highlight states for guided emphasis */
  .hl-equity {
    background: rgba(146, 64, 14, 0.10);
    padding: 4px 6px;
    margin: 0 -6px;
    border-radius: 3px;
  }

  /* Fade states for balance sheet de-emphasis */
  .acct-fade-40 { opacity: 0.3; transition: opacity 0.25s; }
  .acct-fade-50 { opacity: 0.5; transition: opacity 0.25s; }

  /* ===== CENTER COLUMN: TEXT CARD ===== */
  .center-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .stage-text {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    color: #2a2a2a;
  }
  .stage-text p { margin: 0 0 12px; }
  .stage-text p:last-child { margin-bottom: 0; }
  .stage-text strong { color: var(--primary); }
  .stage-text.no-color-bold strong { color: inherit; }
  .stage-instruction {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #888;
    font-style: italic;
    line-height: 1.6;
    margin-top: 12px;
  }

  /* ===== FLOW STATEMENT PANELS ===== */
  /* Color scheme mirrors the Simple Case activity tags:
     CFS = green (#166534), SCE = amber (#92400e) */
  .decomp-section {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .decomp-section h4 {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }
  .decomp-cfs h4 { color: #166534; }
  .decomp-sce h4 { color: #92400e; }
  .decomp-is  h4 { color: #6d28d9; }

  .decomp-cat-label {
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #999;
    margin: 8px 0 3px;
  }
  .decomp-line {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 3px 0;
    color: #555;
  }
  .decomp-line .dl-val { font-weight: 600; color: #333; }
  .decomp-total {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding-top: 8px;
    margin-top: 6px;
    border-top: 1px solid #ddd;
  }

  /* Clickable CFS line items */
  .decomp-line.cfs-clickable {
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.12s;
    padding-left: 4px;
    padding-right: 4px;
  }
  .decomp-line.cfs-clickable:hover {
    background: #f0f7f2;
  }
  .decomp-line.cfs-clickable.cfs-open {
    background: #e8f4ec;
    color: #333;
  }
  .cfs-expand-icon {
    font-size: 11px;
    margin-left: 6px;
    opacity: 0.5;
    user-select: none;
    display: inline-block;
    color: #166534;
  }

  /* Scenario card that expands below a CFS line */
  .cfs-scenario {
    background: #f6fbf7;
    border: 1px solid #b7dfc3;
    border-radius: 5px;
    padding: 10px 13px;
    margin: 4px 0 6px 12px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.55;
    color: #2d4a35;
  }
  .cfs-scenario p {
    margin: 0 0 6px;
  }
  .cfs-scenario p:last-child {
    margin-bottom: 0;
  }

  /* Sealed net-income line */
  .sealed-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    background: #f5f3ff;
    border: 1px dashed #c4b5fd;
    border-radius: 4px;
    margin: 4px 0 2px;
    gap: 8px;
  }
  .sealed-label { display: flex; flex-direction: column; gap: 2px; }
  .sealed-label .sl-main { font-weight: 500; color: #444; }
  .sealed-label .sl-note {
    font-size: 12px;
    color: #aaa;
    line-height: 1.4;
  }
  .sealed-val {
    font-weight: 600;
    white-space: nowrap;
    padding-top: 1px;
  }

  /* ===== EQUATION BOX (Stage 1 — Cash Path) ===== */
  .eq-box {
    background: var(--primary-faint);
    border-radius: 5px;
    padding: 12px 12px;
    font-size: 13px;
    margin-top: 14px;
    font-family: Inter, system-ui, sans-serif;
  }
  .eq-box-heading {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #555;
    margin-bottom: 14px;
  }
  .eq-group {
    margin-bottom: 8px;
  }
  .eq-group:last-of-type {
    margin-bottom: 0;
  }
  .eq-source {
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
  }
  .eq-formula {
    color: #444;
    font-family: 'Georgia', serif;
    font-size: 15px;
  }
  .eq-note {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
  }
  .panel-footnote {
    font-size: 12px;
    color: #888;
    margin-top: 8px;
  }

  /* ===== REFLECTION PROMPT (Stage 5) ===== */
  .prompt-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .prompt-q {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    color: #2a2a2a;
    margin: 0 0 14px;
  }
  .prompt-card textarea {
    width: 100%;
    min-height: 100px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: #2a2a2a;
    resize: vertical;
    box-sizing: border-box;
  }
  .prompt-card textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .prompt-card textarea::placeholder {
    color: #bbb;
    font-style: italic;
  }
  .transition-note {
    background: var(--primary-faint);
    border: 1px solid #dce4ee;
    border-radius: 6px;
    padding: 14px 18px;
    font-family: 'Open Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.65;
    color: #444;
  }

  /* ===== STAGE-CLOSING FOOTNOTE ===== */
  .stage-footnote {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #999;
    font-style: italic;
    line-height: 1.55;
    margin-top: 8px;
  }

  /* ===== NAV BUTTONS ===== */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0;
    margin-bottom: 20px;
  }
  .btn-back {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
    border: 1px solid #ddd;
    color: #555;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-back:hover:not(:disabled) { background: #f5f5f5; border-color: #bbb; }
  .btn-back:disabled { color: #ccc; cursor: default; }
  .btn-next {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    background: var(--primary);
    color: white;
    border: none;
    transition: background 0.15s;
  }
  .btn-next:hover { background: var(--primary-light); }
  .btn-next:disabled { background: #ccc; cursor: default; }

  /* Two-column grid variant for Stage 0 (no center column) */
  .main-grid.two-col { grid-template-columns: 1fr 1fr; }
  /* Single-column grid variant for Stage 5 (Consolidate) */
  .main-grid.one-col { grid-template-columns: 1fr; }
  @media (max-width: 580px) {
    .main-grid.two-col { grid-template-columns: 1fr; }
  }

  /* ===== RESPONSIVE: STAGE TEXT SCALE-UP ===== */
  @media (min-width: 900px) {
    .stage-text { font-size: 16px; }
    .bs-col-header { font-size: 12px; }
    .acct-line { font-size: 14px; }
  }
  @media (min-width: 1200px) {
    .stage-text { font-size: 17px; }
    .acct-line { font-size: 15px; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr 1.5fr 1fr; gap: 8px; }
    .acct-line { font-size: 13px; }
    .decomp-line { font-size: 12px; }
    .stage-text { font-size: 15px; }
    .dib-val { font-size: 13px; }
  }
  @media (max-width: 580px) {
    .main-grid { grid-template-columns: 1fr; }
    .dual-identity-bar { flex-direction: column; gap: 10px; padding: 10px 16px; }
    .dib-divider { width: 60%; height: 1px; }
    .articulate-wrap { padding: 0 12px 28px; }
  }
</style>
</head>
<body>

<div class="content content-standalone">
  <div id="react-root"></div>
</div>

<script src="config.js?v=2"></script>
<script src="shared.js"></script>
<script>
  applyConfig();
  markModuleVisited(4);
</script>

<!-- React 18 via CDN (matches reflect4_sarah.html) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const STORAGE_KEY = 'prework_articulate1';

// ===== FIXED DATASET =====
// All numbers internally consistent (verified below):
//   Opening: 40K + 80K = 120K assets; 120K − 50K = 70K equities  ✓
//   Closing:  58K + 92K = 150K assets; 150K − 56K = 94K equities  ✓
//   CFS: 26K − 10K + 2K = 18K net change; 40K + 18K = 58K        ✓
//   SCE: 70K + 8K − 4K + 20K = 94K closing                        ✓

const OPENING = { cash: 40000, nonCash: 80000, loan: 50000, contributed: 60000, retained: 10000 };
const CLOSING  = { cash: 58000, nonCash: 92000, loan: 56000, contributed: 60000, retained: 34000 };

const CFS = {
  operating:  26000,
  investing: -10000,
  financing:   2000,
  netChange:  18000,
};

const SCE = {
  opening:       70000,
  distributions: -4000,
  netIncome:     28000,
  closing:       94000,
};

const IS = {
  revenue:   52000,
  expenses: -24000,
  netIncome: 28000,   // must equal SCE.netIncome
};

// ===== STAGE DEFINITIONS =====
const STAGES = [
  { id: 'snapshots',   centerHeader: 'The Question',                    label: 'Two Snapshots'        },
  { id: 'cash-path',   centerHeader: 'What Changed and Why: Cash',     label: 'The Cash Path'        },
  { id: 'equity-path', centerHeader: 'What Changed and Why: Equities', label: 'The Equity Path'      },
  { id: 'income-stmt', centerHeader: 'What Changed and Why: Net Income', label: 'The Net Income Path'  },
  { id: 'system',      centerHeader: 'What Changed and Why',           label: 'The System'           },
  { id: 'consolidate', centerHeader: 'Reflect',                         label: 'Consolidate'          },
];

// ===== FORMATTERS =====
function fmt(n) {
  if (n === 0) return '$0';
  const abs = '$' + Math.abs(n).toLocaleString();
  return n < 0 ? '(' + abs + ')' : abs;
}
function fmtChange(n) {
  if (n === 0) return '$0';
  const abs = '$' + Math.abs(n).toLocaleString();
  return n > 0 ? abs : '(' + abs + ')';
}
function amtColor(n) {
  if (n > 0) return '#166534';
  if (n < 0) return '#dc2626';
  return '#333';
}

// ===== DUAL IDENTITY BAR =====
// Shows A − L = E for both balance sheets simultaneously, reinforcing
// that the accounting identity holds at both dates.
function DualIdentityBar() {
  function Side({ tag, data }) {
    const assets = data.cash + data.nonCash;
    return (
      <div className="dib-side">
        <span className="dib-tag">{tag}</span>
        <div className="dib-eq">
          <div className="dib-group">
            <span className="dib-label">Assets</span>
            <span className="dib-val">{fmt(assets)}</span>
          </div>
          <span className="dib-op">&minus;</span>
          <div className="dib-group">
            <span className="dib-label">Liabilities</span>
            <span className="dib-val">{fmt(data.loan)}</span>
          </div>
          <span className="dib-op">=</span>
          <div className="dib-group">
            <span className="dib-label">Equities</span>
            <span className="dib-val">{fmt(data.contributed + data.retained)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="dual-identity-bar">
      <Side tag="Opening" data={OPENING} />
      <div className="dib-divider" />
      <Side tag="Closing" data={CLOSING} />
    </div>
  );
}

// ===== STATIC BALANCE SHEET =====
// Displays a balance sheet at the single-line equities level.
// highlight: null | 'cash' | 'equity' | 'both'
function StaticBalanceSheet({ data, highlight }) {
  const totalAssets  = data.cash + data.nonCash;
  const hlEquity     = highlight === 'both';
  const fadeCash     = highlight === 'cash';    // fade all except Cash row
  const fadeEquity   = highlight === 'equity';  // fade all except Retained earnings + Total Equities

  const fc = fadeCash  ? ' acct-fade-40' : '';
  const fe = fadeEquity ? ' acct-fade-40' : '';
  const fh = (fadeCash || fadeEquity) ? ' acct-fade-50' : '';  // section headings

  return (
    <div>
      <div className="acct-col">
        <h4 className={fadeEquity ? 'acct-fade-50' : ''}>Assets</h4>
        <div className={'acct-line' + fe}>
          <span>Cash</span>
          <span className="acct-val">{fmt(data.cash)}</span>
        </div>
        <div className={'acct-line' + fc + fe}>
          <span>Non-cash assets</span>
          <span className="acct-val">{fmt(data.nonCash)}</span>
        </div>
        <div className={'acct-total' + fc + fe}>
          <span>Total Assets</span>
          <span>{fmt(totalAssets)}</span>
        </div>
      </div>

      <div className="acct-col">
        <h4 className={fh.trim()}>Liabilities</h4>
        <div className={'acct-line' + fc + fe}>
          <span>Bank loan</span>
          <span className="acct-val">{fmt(data.loan)}</span>
        </div>
        <div className={'acct-total' + fc + fe}>
          <span>Total Liabilities</span>
          <span>{fmt(data.loan)}</span>
        </div>
      </div>

      <div className="acct-col">
        <h4>Equities</h4>
        <div className={'acct-line' + fc + fe}>
          <span>Contributed capital</span>
          <span className="acct-val">{fmt(data.contributed)}</span>
        </div>
        <div className={'acct-line' + (hlEquity ? ' hl-equity' : '') + fc}>
          <span>Retained earnings</span>
          <span className="acct-val">{fmt(data.retained)}</span>
        </div>
        <div className={'acct-total' + (hlEquity ? ' hl-equity' : '') + fc}>
          <span>Total Equities</span>
          <span>{fmt(data.contributed + data.retained)}</span>
        </div>
      </div>
    </div>
  );
}



// ===== CFS SCENARIO TEXTS =====
const CFS_SCENARIOS = {
  operating: (
    <div className="cfs-scenario">
      <p>During the period, the entity received $26,000 in cash from its core business activities.</p>
      <p>For example, it may have sold products or provided services and collected cash from customers. Because this cash came from the entity's regular operations, it appears under Operating in the statement of cash flows.</p>
    </div>
  ),
  investing: (
    <div className="cfs-scenario">
      <p>During the period, the entity used $10,000 of cash to acquire a longer-term resource.</p>
      <p>For example, it may have purchased equipment that will help the business operate in future periods. Because this cash was used to invest in a long-term asset, it appears under Investing.</p>
    </div>
  ),
  financing: (
    <div className="cfs-scenario">
      <p>During the period, the entity received $2,000 of cash from financing activity.</p>
      <p>For example, the entity may have borrowed cash through its bank loan. Because this cash came from financing rather than from business operations, it appears under Financing.</p>
    </div>
  ),
};

// ===== CFS PANEL =====
// Each category line is clickable; multiple scenario cards can be open at once.
function CfsPanel() {
  const [openKeys, setOpenKeys] = useState(new Set());

  function toggle(key) {
    setOpenKeys(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  function CfsLine({ lineKey, label, amount }) {
    const isOpen = openKeys.has(lineKey);
    return (
      <>
        <div
          className={'decomp-line cfs-clickable' + (isOpen ? ' cfs-open' : '')}
          onClick={() => toggle(lineKey)}
          role="button"
          aria-expanded={isOpen}
        >
          <span>
            {label}
            <span className="cfs-expand-icon">{isOpen ? '▲' : '▼'}</span>
          </span>
          <span className="dl-val">{fmtChange(amount)}</span>
        </div>
        {isOpen && CFS_SCENARIOS[lineKey]}
      </>
    );
  }

  return (
    <div className="decomp-section decomp-cfs" style={{ borderLeft: '3px solid #166534' }}>
      <h4>Cash Flow Statement</h4>

      <div className="decomp-cat-label">Operating</div>
      <CfsLine lineKey="operating" label="Cash from operations" amount={CFS.operating} />

      <div className="decomp-cat-label">Investing</div>
      <CfsLine lineKey="investing" label="Cash used in investing" amount={CFS.investing} />

      <div className="decomp-cat-label">Financing</div>
      <CfsLine lineKey="financing" label="Cash from financing" amount={CFS.financing} />

      <div className="decomp-total" style={{ color: '#166534' }}>
        <span>Net change in cash</span>
        <span>{fmtChange(CFS.netChange)}</span>
      </div>
    </div>
  );
}

// ===== SCE PANEL =====
function ScePanel() {
  return (
    <div className="decomp-section decomp-sce" style={{ borderLeft: '3px solid #92400e' }}>
      <h4>Statement of Changes in Equities</h4>

      <div className="decomp-line">
        <span>&ensp;Opening equities</span>
        <span className="dl-val">{fmt(SCE.opening)}</span>
      </div>

      <div className="decomp-line">
        <span>&ensp;Net income</span>
        <span className="dl-val">{fmtChange(SCE.netIncome)}</span>
      </div>

      <div className="decomp-line">
        <span>&ensp;Distributions to owners</span>
        <span className="dl-val">{fmtChange(SCE.distributions)}</span>
      </div>

      <div className="decomp-total" style={{ color: '#92400e' }}>
        <span>Closing equities</span>
        <span>{fmt(SCE.closing)}</span>
      </div>
    </div>
  );
}

// ===== IS PANEL =====
// Static income statement: Revenue − Expenses = Net income.
function IsPanel() {
  return (
    <div className="decomp-section decomp-is" style={{ borderLeft: '3px solid #6d28d9' }}>
      <h4>Income Statement</h4>

      <div className="decomp-line">
        <span>&ensp;Revenue</span>
        <span className="dl-val">{fmtChange(IS.revenue)}</span>
      </div>
      <div className="decomp-line">
        <span>&ensp;Expenses</span>
        <span className="dl-val">{fmtChange(IS.expenses)}</span>
      </div>

      <div className="decomp-total" style={{ color: '#6d28d9' }}>
        <span>Net income</span>
        <span>{fmtChange(IS.netIncome)}</span>
      </div>
    </div>
  );
}

// ===== STAGE 4 — The Income Statement =====
function StageIncomeStmt() {
  return (
    <div>
      <IsPanel />
      <p className="panel-footnote">* ( ) denotes a negative amount</p>
    </div>
  );
}

// ===== STAGE 0 — Two Snapshots =====
function StageSnapshots() {
  return null;
}

// ===== STAGE 1 — The Cash Path =====
function StageCashPath() {
  return (
    <div>
      <CfsPanel />
      <p className="panel-footnote">* ( ) denotes a negative amount</p>
    </div>
  );
}

// ===== STAGE 2 — The Equity Path =====
function StageEquityPath() {
  return (
    <div>
      <ScePanel />
      <p className="panel-footnote">* ( ) denotes a negative amount</p>
    </div>
  );
}

// ===== STAGE 5 — The System =====
function StageSystem() {
  return (
    <div>
      <CfsPanel />
      <ScePanel />
      <IsPanel />
      <p className="panel-footnote">* ( ) denotes a negative amount</p>
    </div>
  );
}

// ===== STAGE 5 — Consolidate =====
function StageConsolidate() {
  const [val, setVal] = useState(() => {
    try { return (JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'))['reflect'] || ''; }
    catch(e) { return ''; }
  });
  const timerRef = useRef(null);

  const save = useCallback((v) => {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      s['reflect'] = v;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    } catch(e) {}
  }, []);

  const onChange = useCallback((e) => {
    setVal(e.target.value);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => save(e.target.value), 800);
  }, [save]);

  return (
    <div>
      <div className="prompt-card">
        <p className="prompt-q">
          In your own words: what do the opening and closing balance sheets tell you, and what do the other statements explain that the balance sheets alone do not?
        </p>
        <textarea
          value={val}
          onChange={onChange}
          onBlur={() => save(val)}
          placeholder="Write your response here…"
        />
      </div>
    </div>
  );
}

// ===== CENTER PANEL SWITCHER =====
function CenterPanel({ step }) {
  switch (step) {
    case 0: return <StageSnapshots />;
    case 1: return <StageCashPath />;
    case 2: return <StageEquityPath />;
    case 3: return <StageIncomeStmt />;
    case 4: return <StageSystem />;
    case 5: return <StageConsolidate />;
    default: return null;
  }
}

// ===== FULL-WIDTH INTRO CARD =====
// Renders above the three-column grid for every stage.
function StageIntroCard({ step }) {
  function cardBody() {
    switch (step) {
      case 0:
        return (
          <div className="stage-text no-color-bold">
            <p>Start by comparing the opening and closing balance sheets. Each one is a snapshot of the entity's financial position at a specific point in time — one at the beginning of the period and one at the end of the period.</p>
            <p>The two snapshots are not the same. Assets changed. Liabilities changed. Equity changed.</p>
            <p>The balance sheets show that the entity changed over the period, but by themselves they do not explain how or why those changes happened. In the next stages, you will follow some of the most important parts of that change — including cash, equity, and net income — and see how the other financial statements explain them.</p>
          </div>
        );
      case 1:
        return (
          <>
            <div className="stage-text">
              <p>
                Look first at the <strong>Cash</strong> line under Assets in both balance sheets. The opening
                and closing cash balances are different, so this change needs explanation.
              </p>
              <p>
                <strong>The cash flow statement provides that explanation.</strong> It shows why cash
                changed during the period by breaking the change into <strong>operating</strong>, <strong>investing</strong>,
                and <strong>financing</strong> cash flows.
              </p>
            </div>
            <div className="eq-box">
              <div className="eq-box-heading">Two ways to see the same cash change</div>
              <div className="eq-group">
                <div className="eq-source">From the balance sheet</div>
                <div className="eq-formula">Change in Cash = Closing Cash &minus; Opening Cash</div>
              </div>
              <div className="eq-group">
                <div className="eq-source">From the cash flow statement</div>
                <div className="eq-formula">Net Change in Cash = Operating Cash Flow + Investing Cash Flow + Financing Cash Flow</div>
              </div>
              <div className="eq-note">* These two amounts should match.</div>
            </div>
            <div className="stage-text" style={{ marginTop: '12px' }}>
              <p>
                Click each cash flow category to see a simple scenario behind the amount.
              </p>
            </div>
          </>
        );
      case 2:
        return (
          <>
            <div className="stage-text">
              <p>Now look at the <strong>Equities</strong> section in the two balance sheets. Total equity increased over the period.</p>
              <p><strong>The statement of changes in equities explains that movement.</strong> In this example, the entity earned income during the period and distributed part of that amount to owners. Because contributed capital stayed the same, the change in total equity comes through retained earnings.</p>
            </div>
            <div className="eq-box">
              <div className="eq-box-heading">Three ways to understand the equity change</div>
              <div className="eq-group">
                <div className="eq-source">From the balance sheet</div>
                <div className="eq-formula">Change in Total Equities = Closing Equities &minus; Opening Equities</div>
                <div className="eq-formula">Change in Retained Earnings = Closing Retained Earnings &minus; Opening Retained Earnings</div>
              </div>
              <div className="eq-group">
                <div className="eq-source">In this example</div>
                <div className="eq-formula">Change in Total Equities = Change in Retained Earnings</div>
                <div className="eq-note">* This is because contributed capital stayed the same.</div>
              </div>
              <div className="eq-group">
                <div className="eq-source">From the statement of changes in equities</div>
                <div className="eq-formula">Closing Retained Earnings = Opening Retained Earnings + Net Income &minus; Distributions to Owners</div>
              </div>
            </div>
            <div className="stage-text" style={{ marginTop: '12px' }}>
              <p>One of the lines in this statement is <strong>Net Income</strong>. In the next stage, you will open that line and see how the income statement explains it.</p>
            </div>
          </>
        );
      case 3:
        return (
          <>
            <div className="stage-text">
              <p>In the previous stage, <strong>Net Income</strong> appeared as one line within the statement of changes in equities. This stage opens that line.</p>
              <p><strong>The income statement explains net income by showing the entity's revenue and expenses for the period.</strong></p>
            </div>
            <div className="eq-box">
              <div className="eq-box-heading">How net income is calculated</div>
              <div className="eq-group">
                <div className="eq-source">From the income statement</div>
                <div className="eq-formula">Net Income = Revenue &minus; Expenses</div>
              </div>
            </div>
            <div className="stage-text" style={{ marginTop: '12px' }}>
              <p>This net income is the same $28,000 that appeared in the statement of changes in equities in the previous stage.</p>
            </div>
          </>
        );
      case 4:
        return (
          <div className="stage-text">
            <p>You have now seen the full structure of the system.</p>
            <p>
              The <strong>two balance sheets</strong> are the <strong>snapshots</strong>. The <strong>cash flow statement</strong> explains
              the change in <strong>cash</strong>. The <strong>statement of changes in equities</strong> explains the change in <strong>total equity</strong>. The <strong>income statement</strong> explains the <strong>net income</strong> line that appears
              within the equity story.
            </p>
            <p>
              These are not separate reports that happen to fit together. They are connected
              explanations of the change between the opening and closing balance sheets.
            </p>
          </div>
        );
      case 5:
        return (
          <div className="stage-text">
            <p>The structure is now complete. Take a moment to consolidate what you've seen.</p>
          </div>
        );
      default:
        return null;
    }
  }

  const body = cardBody();
  if (!body) return null;
  return (
    <div className="center-card">
      <div className="stage-card-title">{STAGES[step].label}</div>
      {body}
    </div>
  );
}

// ===== MAIN COMPONENT =====
function GuidedArticulation() {
  const [step, setStep] = useState(0);

  const isFirst = step === 0;
  const isLast  = step === STAGES.length - 1;
  const stage   = STAGES[step];

  // Which balance sheet rows to highlight at each stage
  const highlight = (() => {
    if (step === 4) return null;
    if (step === 1) return 'cash';
    if (step === 2 || step === 3) return 'equity';
    return null;
  })();

  // Closing balance sheet header turns accent after Stage 0 to signal
  // that the period has now begun to unfold.
  const closingHdrClass = 'bs-col-header';

  return (
    <div>
      <div className="page-intro">
        <p>Page Introduction Text (to be added).</p>
      </div>

      <div className="articulate-wrap">

        {/* Full-width intro card — renders above the grid for every stage */}
        <StageIntroCard step={step} />

        {/* Navigation */}
        <div className="nav-buttons">
          <button
            className="btn-back"
            disabled={isFirst}
            onClick={() => setStep(s => s - 1)}
          >
            &larr; Back
          </button>
          {!isLast && (
            <button
              className="btn-next"
              onClick={() => setStep(s => s + 1)}
            >
              Next &rarr;
            </button>
          )}
        </div>

        {/* Grid: two-column at Stage 0, single-column at Stage 5, three-column otherwise */}
        <div className={'main-grid' + (step === 0 ? ' two-col' : '') + (step === 5 ? ' one-col' : '')}>

          {/* Left: Opening Balance Sheet — hidden at Stage 5 */}
          {step !== 5 && (
            <div>
              <div className="bs-col-header">Opening Balance Sheet</div>
              <StaticBalanceSheet data={OPENING} highlight={highlight} />
            </div>
          )}

          {/* Center: Stage content — hidden at Stage 0 */}
          {step > 0 && (
            <div>
              <div className="bs-col-header">{stage.centerHeader}</div>
              <CenterPanel step={step} />
            </div>
          )}

          {/* Right: Closing Balance Sheet — hidden at Stage 5 */}
          {step !== 5 && (
            <div>
              <div className={closingHdrClass}>Closing Balance Sheet</div>
              <StaticBalanceSheet data={CLOSING} highlight={highlight} />
            </div>
          )}

        </div>{/* /main-grid */}

      </div>{/* /articulate-wrap */}
    </div>
  );
}

// ===== MOUNT =====
const root = ReactDOM.createRoot(document.getElementById('react-root'));
root.render(<GuidedArticulation />);
</script>

</body>
</html>

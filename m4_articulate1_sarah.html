<!DOCTYPE html>
<html lang="en" class="articulate-embed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounting Pre-Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=2">
<style>
  /* ===== EMBED SHELL ===== */
  html.articulate-embed,
  html.articulate-embed body {
    height: 100%;
    margin: 0;
  }
  html.articulate-embed body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: Inter, system-ui, sans-serif;
  }
  .content.content-standalone {
    max-width: none;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ===== DUAL IDENTITY BAR ===== */
  /* Mirrors the identity-bar from the Simple Case activity, adapted to show
     both balance-sheet identities simultaneously. */
  .dual-identity-bar {
    background: var(--primary);
    color: white;
    border-radius: 0 0 6px 6px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: Inter, system-ui, sans-serif;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dib-side {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dib-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    opacity: 0.65;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 3px;
    padding: 2px 6px;
    white-space: nowrap;
  }
  .dib-eq {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .dib-group {
    text-align: center;
  }
  .dib-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.7;
    font-weight: 600;
    display: block;
    margin-bottom: 1px;
  }
  .dib-val {
    font-weight: 700;
    font-size: 14px;
    display: block;
  }
  .dib-op {
    font-size: 14px;
    opacity: 0.55;
    align-self: flex-end;
    padding-bottom: 2px;
  }
  .dib-divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* ===== PAGE INTRO TEXT ===== */
  .page-intro {
    font-family: 'Open Sans', sans-serif;
    font-size: 1rem;
    line-height: 1.7;
    color: #373a44;
    padding: 20px 20px 0;
  }

  /* ===== OUTER WRAP ===== */
  .articulate-wrap {
    padding: 12px 16px 32px;
  }

  /* ===== STAGE PROGRESS ===== */
  .stage-progress {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
    font-family: Inter, system-ui, sans-serif;
  }
  .stage-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
    transition: background 0.2s, width 0.2s, height 0.2s;
  }
  .stage-dot.done   { background: var(--primary-light); }
  .stage-dot.active { background: var(--accent); width: 10px; height: 10px; }
  .stage-label-pill {
    margin-left: 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
  }
  .stage-card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  /* ===== THREE-COLUMN GRID ===== */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1.8fr 1fr;
    gap: 14px;
    margin-bottom: 0;
    align-items: start;
  }

  /* ===== COLUMN HEADERS ===== */
  .bs-col-header {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--primary);
    text-align: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
  }
  .bs-col-header.closing {
    color: var(--accent);
    border-color: var(--accent);
  }
  .bs-col-header.center-hdr {
    color: #555;
    border-color: #aaa;
  }

  /* ===== BALANCE SHEET ===== */
  .acct-col {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .acct-col h4 {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--primary);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
  }
  .acct-line {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 14px;
    padding: 4px 2px;
    color: #555;
    border-radius: 3px;
    transition: background 0.25s;
  }
  .acct-line .acct-val {
    font-weight: 600;
    color: #333;
  }
  .acct-total {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    padding-top: 8px;
    margin-top: 6px;
    border-top: 1px solid #ddd;
  }

  /* Highlight states for guided emphasis */
  .hl-equity {
    background: rgba(146, 64, 14, 0.10);
    padding: 4px 6px;
    margin: 0 -6px;
    border-radius: 3px;
  }

  /* Fade states for balance sheet de-emphasis */
  .acct-fade-40 { opacity: 0.3; transition: opacity 0.25s; }
  .acct-fade-50 { opacity: 0.5; transition: opacity 0.25s; }

  /* ===== CENTER COLUMN: TEXT CARD ===== */
  .center-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .stage-text {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    color: #2a2a2a;
  }
  .stage-text p { margin: 0 0 12px; }
  .stage-text p:last-child { margin-bottom: 0; }
  .stage-text strong { color: var(--primary); }
  .stage-text.no-color-bold strong { color: inherit; }
  .stage-instruction {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #888;
    font-style: italic;
    line-height: 1.6;
    margin-top: 12px;
  }

  /* ===== FLOW STATEMENT PANELS ===== */
  /* Color scheme mirrors the Simple Case activity tags:
     CFS = green (#166534), SCE = amber (#92400e) */
  .decomp-section {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .decomp-section h4 {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }
  .decomp-cfs h4 { color: #166534; }
  .decomp-sce h4 { color: #92400e; }
  .decomp-is  h4 { color: #6d28d9; }

  .decomp-cat-label {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #999;
    margin: 8px 0 3px;
  }
  .decomp-line {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 3px 0;
    color: #555;
  }
  .decomp-line .dl-val { font-weight: 600; color: #333; }
  .decomp-total {
    display: flex;
    justify-content: space-between;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding-top: 8px;
    margin-top: 6px;
    border-top: 1px solid #ddd;
  }

  /* Clickable CFS line items */
  .decomp-line.cfs-clickable {
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.12s;
    padding-left: 4px;
    padding-right: 4px;
  }
  .decomp-line.cfs-clickable:hover {
    background: #f0f7f2;
  }
  .decomp-line.cfs-clickable.cfs-open {
    background: #e8f4ec;
    color: #333;
  }
  .cfs-expand-icon {
    font-size: 11px;
    margin-left: 6px;
    opacity: 0.5;
    user-select: none;
    display: inline-block;
    color: #166534;
  }

  /* Scenario card that expands below a CFS line */
  .cfs-scenario {
    background: #f6fbf7;
    border: 1px solid #b7dfc3;
    border-radius: 5px;
    padding: 10px 13px;
    margin: 4px 0 6px 12px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.55;
    color: #2d4a35;
  }
  .cfs-scenario p {
    margin: 0 0 6px;
  }
  .cfs-scenario p:last-child {
    margin-bottom: 0;
  }

  /* Sealed net-income line */
  .sealed-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    background: #f5f3ff;
    border: 1px dashed #c4b5fd;
    border-radius: 4px;
    margin: 4px 0 2px;
    gap: 8px;
  }
  .sealed-label { display: flex; flex-direction: column; gap: 2px; }
  .sealed-label .sl-main { font-weight: 500; color: #444; }
  .sealed-label .sl-note {
    font-size: 12px;
    color: #aaa;
    line-height: 1.4;
  }
  .sealed-val {
    font-weight: 600;
    white-space: nowrap;
    padding-top: 1px;
  }

  /* ===== CLARIFICATION CARD ===== */
  .clarif-card {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f0f6ff;
    border: 1px solid #c8daf5;
    border-radius: 6px;
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: #2a2a2a;
  }
  .clarif-card-heading {
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #334155;
    margin-bottom: 6px;
  }
  .clarif-card p { margin: 0; }

  /* ===== EQUATION BOX (Stage 1 — Cash Path) ===== */
  .eq-box {
    background: var(--primary-faint);
    border-radius: 5px;
    padding: 12px 12px;
    font-size: 13px;
    margin-top: 14px;
    font-family: Inter, system-ui, sans-serif;
  }
  .eq-box-heading {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #555;
    margin-bottom: 14px;
  }
  .eq-group {
    margin-bottom: 8px;
  }
  .eq-group:last-of-type {
    margin-bottom: 0;
  }
  .eq-source {
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
  }
  .eq-formula {
    color: #444;
    font-family: 'Georgia', serif;
    font-size: 15px;
  }
  .eq-note {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
  }
  .panel-footnote {
    font-size: 12px;
    color: #888;
    margin-top: 8px;
  }

  /* Clickable Net Income line inside SCE panel */
  .sce-ni-clickable {
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.12s;
    padding: 3px 6px 3px 0;
    margin: 0 -6px 0 0;
  }
  .sce-ni-clickable:hover { background: #fef3c7; }
  .sce-ni-clickable.sce-ni-open { background: #fde68a; color: #333; }
  .sce-expand-icon {
    font-size: 11px;
    margin-left: 6px;
    opacity: 0.5;
    user-select: none;
    display: inline-block;
    color: #92400e;
  }

  /* Nested income statement reveal inside SCE */
  .sce-is-nested {
    margin: 2px 0 6px 14px;
    padding-left: 12px;
    border-left: 2px solid #c4b5fd;
  }
  .sce-is-intro {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    color: #555;
    margin: 6px 0 8px;
    line-height: 1.5;
  }
  .sce-is-panel {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .sce-is-title {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #6d28d9;
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid #ede9fe;
  }
  .sce-is-confirm {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #666;
    font-style: italic;
    margin: 0;
    line-height: 1.5;
  }

  /* ===== KNOWLEDGE CHECK (Consolidate Stage) ===== */
  .kc-wrap { display: flex; flex-direction: column; gap: 18px; }
  .kc-question {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 16px 20px;
  }
  .kc-q-text {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #2a2a2a;
    margin: 0 0 12px;
    line-height: 1.55;
  }
  .kc-q-num { margin-right: 4px; }
  .kc-choices { display: flex; flex-direction: column; gap: 7px; }
  .kc-choice {
    text-align: left;
    background: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 9px 14px;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    color: #2a2a2a;
    cursor: pointer;
    line-height: 1.5;
    transition: background 0.12s, border-color 0.12s;
  }
  .kc-choice:not(:disabled):hover { background: #eef2ff; border-color: #b0bfe8; }
  .kc-choice:disabled { cursor: default; }
  .kc-letter { font-weight: 600; margin-right: 4px; }
  .kc-correct { background: #f0faf3; border-color: #4caf50; color: #1a6b2e; }
  .kc-incorrect { background: #fff5f5; border-color: #e57373; color: #b91c1c; }
  .kc-dimmed { opacity: 0.4; }
  .kc-feedback {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  .kc-fb-correct { background: #f0faf3; border: 1px solid #a8d5b0; color: #1a6b2e; }
  .kc-fb-incorrect { background: #fff5f5; border: 1px solid #f5a0a0; color: #b91c1c; }
  .kc-reflection {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 16px 20px;
  }
  .kc-reflection-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    font-style: italic;
    color: #666;
    margin: 0 0 10px;
  }
  .kc-reflection textarea {
    width: 100%;
    min-height: 90px;
    padding: 10px 12px;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    resize: vertical;
    box-sizing: border-box;
    color: #2a2a2a;
  }
  .kc-reflection textarea:focus { outline: none; border-color: var(--primary); }
  .kc-reflection textarea::placeholder { color: #bbb; font-style: italic; }

  /* ===== REFLECTION PROMPT (Stage 5) ===== */
  .prompt-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .prompt-q {
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    color: #2a2a2a;
    margin: 0 0 14px;
  }
  .prompt-card textarea {
    width: 100%;
    min-height: 100px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: #2a2a2a;
    resize: vertical;
    box-sizing: border-box;
  }
  .prompt-card textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .prompt-card textarea::placeholder {
    color: #bbb;
    font-style: italic;
  }
  .transition-note {
    background: var(--primary-faint);
    border: 1px solid #dce4ee;
    border-radius: 6px;
    padding: 14px 18px;
    font-family: 'Open Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.65;
    color: #444;
  }

  /* ===== STAGE-CLOSING FOOTNOTE ===== */
  .stage-footnote {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #999;
    font-style: italic;
    line-height: 1.55;
    margin-top: 8px;
  }

  /* ===== NAV BUTTONS ===== */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0;
    margin-bottom: 20px;
  }
  .btn-back {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
    border: 1px solid #ddd;
    color: #555;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-back:hover:not(:disabled) { background: #f5f5f5; border-color: #bbb; }
  .btn-back:disabled { color: #ccc; cursor: default; }
  .btn-next {
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    background: var(--primary);
    color: white;
    border: none;
    transition: background 0.15s;
  }
  .btn-next:hover { background: var(--primary-light); }
  .btn-next:disabled { background: #ccc; cursor: default; }

  /* Two-column grid variant for Stage 0 (no center column) */
  .main-grid.two-col { grid-template-columns: 1fr 1fr; }
  /* Single-column grid variant for Stage 5 (Consolidate) */
  .main-grid.one-col { grid-template-columns: 1fr; }
  @media (max-width: 580px) {
    .main-grid.two-col { grid-template-columns: 1fr; }
  }

  /* ===== RESPONSIVE: STAGE TEXT SCALE-UP ===== */
  @media (min-width: 900px) {
    .stage-text { font-size: 16px; }
    .bs-col-header { font-size: 12px; }
    .acct-line { font-size: 14px; }
  }
  @media (min-width: 1200px) {
    .stage-text { font-size: 17px; }
    .acct-line { font-size: 15px; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr 1.5fr 1fr; gap: 8px; }
    .acct-line { font-size: 13px; }
    .decomp-line { font-size: 12px; }
    .stage-text { font-size: 15px; }
    .dib-val { font-size: 13px; }
  }
  @media (max-width: 580px) {
    .main-grid { grid-template-columns: 1fr; }
    .dual-identity-bar { flex-direction: column; gap: 10px; padding: 10px 16px; }
    .dib-divider { width: 60%; height: 1px; }
    .articulate-wrap { padding: 0 12px 28px; }
  }
</style>
</head>
<body>

<div class="content content-standalone">
  <div id="react-root"></div>
</div>

<script src="config.js?v=2"></script>
<script src="shared.js"></script>
<script>
  applyConfig();
  markModuleVisited(4);
</script>

<!-- React 18 via CDN (matches reflect4_sarah.html) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const STORAGE_KEY = 'prework_articulate1';

// ===== FIXED DATASET =====
// All numbers internally consistent (verified below):
//   Opening: 40K + 80K = 120K assets; 120K − 50K = 70K equities  ✓
//   Closing:  58K + 92K = 150K assets; 150K − 56K = 94K equities  ✓
//   CFS: 26K − 10K + 2K = 18K net change; 40K + 18K = 58K        ✓
//   SCE: 70K + 8K − 4K + 20K = 94K closing                        ✓

const OPENING = { cash: 40000, nonCash: 80000, loan: 50000, contributed: 60000, retained: 10000 };
const CLOSING  = { cash: 58000, nonCash: 92000, loan: 56000, contributed: 60000, retained: 34000 };

const CFS = {
  operating:  26000,
  investing: -10000,
  financing:   2000,
  netChange:  18000,
};

const SCE = {
  opening:       70000,
  distributions: -4000,

// ===== FORMATTERS =====
function fmt(n) {
  if (n === 0) return '$0';
  const abs = '$' + Math.abs(n).toLocaleString();
  return n < 0 ? '(' + abs + ')' : abs;
}
function fmtChange(n) {
  if (n === 0) return '$0';
  const abs = '$' + Math.abs(n).toLocaleString();
  return n > 0 ? abs : '(' + abs + ')';
}
function amtColor(n) {
  if (n > 0) return '#166534';
  if (n < 0) return '#dc2626';
  return '#333';
}

// Each category line is clickable; multiple scenario cards can be open at once.
function CfsPanel() {
  const [openKeys, setOpenKeys] = useState(new Set());

  function toggle(key) {
    setOpenKeys(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  function CfsLine({ lineKey, label, amount }) {
    const isOpen = openKeys.has(lineKey);
    return (
      <>
        <div
          className={'decomp-line cfs-clickable' + (isOpen ? ' cfs-open' : '')}
          onClick={() => toggle(lineKey)}
          role="button"
          aria-expanded={isOpen}
        >
          <span>
            {label}
            <span className="cfs-expand-icon">{isOpen ? '▲' : '▼'}</span>
          </span>
          <span className="dl-val">{fmtChange(amount)}</span>
        </div>
        {isOpen && CFS_SCENARIOS[lineKey]}
      </>
    );
  }

  return (
    <div className="decomp-section decomp-cfs">
      <h4>Cash Flow Statement</h4>

      <div className="decomp-cat-label">Operating</div>
      <CfsLine lineKey="operating" label="Cash from operations" amount={CFS.operating} />

      <div className="decomp-cat-label">Investing</div>
      <CfsLine lineKey="investing" label="Cash used in investing" amount={CFS.investing} />

      <div className="decomp-cat-label">Financing</div>
      <CfsLine lineKey="financing" label="Cash from financing" amount={CFS.financing} />

      <div className="decomp-total" style={{ color: '#166534' }}>
        <span>Net increase in cash</span>
        <span>{fmtChange(CFS.netChange)}</span>
      </div>
    </div>
  );
}

function StageConsolidate() {
  const [answers, setAnswers] = React.useState({ q1: null, q2: null, q3: null, q4: null });
  const [val, setVal] = useState(() => {
    try { return (JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'))['reflect'] || ''; }
    catch(e) { return ''; }
  });
  const timerRef = useRef(null);

  const save = useCallback((v) => {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      s['reflect'] = v;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    } catch(e) {}
  }, []);

  const onChange = useCallback((e) => {
    setVal(e.target.value);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => save(e.target.value), 800);
  }, [save]);

  const select = (qId, idx) => {
    setAnswers(prev => prev[qId] === null ? { ...prev, [qId]: idx } : prev);
  };

  return (
    <div className="kc-wrap">
      {KC_QUESTIONS.map((q, qi) => {
        const selected = answers[q.id];
        const answered = selected !== null;
        const isCorrect = selected === q.correct;
        return (
          <div key={q.id} className="kc-question">
            <p className="kc-q-text"><span className="kc-q-num">{qi + 1}.</span> {q.question}</p>
            <div className="kc-choices">
              {q.choices.map((choice, ci) => {
                let cls = 'kc-choice';
                if (answered) {
                  if (ci === q.correct) cls += ' kc-correct';
                  else if (ci === selected) cls += ' kc-incorrect';
                  else cls += ' kc-dimmed';
                }
                return (
                  <button key={ci} className={cls} onClick={() => select(q.id, ci)} disabled={answered}>
                    <span className="kc-letter">{String.fromCharCode(65 + ci)}.</span> {choice}
                  </button>
                );
              })}
            </div>
            {answered && (
              <div className={'kc-feedback ' + (isCorrect ? 'kc-fb-correct' : 'kc-fb-incorrect')}>
                {isCorrect ? q.correctFeedback : q.incorrectFeedback}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

          {step > 0 && (
            <div>
              {step !== 5 && <div className="bs-col-header">{stage.centerHeader}</div>}
              <CenterPanel step={step} />
            </div>
          )}

          {/* Right: Closing Balance Sheet — hidden at Consolidate */}
          {step !== 5 && (
            <div>
              <div className={closingHdrClass}>Closing Balance Sheet</div>
              <StaticBalanceSheet data={CLOSING} highlight={highlight} />
            </div>
          )}

        </div>{/* /main-grid */}

      </div>{/* /articulate-wrap */}
    </div>
  );
}

// ===== MOUNT =====
const root = ReactDOM.createRoot(document.getElementById('react-root'));
root.render(<GuidedArticulation />);
</script>

</body>
</html>
